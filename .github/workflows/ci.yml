# push / PR のたびにオフラインテスト一式を回す（APIキー不要のテストのみ）
name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        # pytest は開発用のためrequirements.txtに含めていない（ここで追加インストール）
        run: pip install -r requirements.txt pytest

      - name: Run tests (offline, smoke除外)
        env:
          GOOGLE_API_KEY: dummy
          TAVILY_API_KEY: dummy
          SECRET_KEY: dummy
        run: pytest tests/ -q -k "not smoke"

      - name: JS syntax check
        run: |
          for f in src/static/js/*.js; do node --check "$f"; done

      - name: Templates compile check
        env:
          GOOGLE_API_KEY: dummy
          TAVILY_API_KEY: dummy
          SECRET_KEY: dummy
        working-directory: src
        run: |
          python - <<'PY'
          from pathlib import Path
          from app import app
          for t in Path("templates").rglob("*.html"):
              app.jinja_env.get_template(str(t.relative_to("templates")))
          print("all templates OK")
          PY
