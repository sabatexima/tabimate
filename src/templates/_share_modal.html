{# 共有モーダル（旅・プラン共通）。openShareModal(resourceType, resourceId) で開く。 #}
<style>
  .sm-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 300; align-items: center; justify-content: center; padding: 16px;
  }
  .sm-box {
    background: #fff; border-radius: 14px; width: 100%; max-width: 520px;
    max-height: 88vh; overflow-y: auto; box-shadow: 0 12px 40px rgba(0,0,0,0.25);
  }
  .sm-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 18px; border-bottom: 1px solid #eee; position: sticky; top: 0; background: #fff;
  }
  .sm-head h3 { margin: 0; font-size: 1.15rem; color: var(--text-main); }
  .sm-close { background: none; border: none; font-size: 1.3rem; cursor: pointer; color: var(--text-muted); line-height: 1; }
  .sm-body { padding: 18px; }
  .sm-section { margin-bottom: 24px; }
  .sm-section h4 { margin: 0 0 4px; font-size: 0.98rem; color: var(--text-main); }
  .sm-section .sm-hint { margin: 0 0 12px; font-size: 0.8em; color: var(--text-muted); line-height: 1.5; }
  .sm-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .sm-row input[type=email], .sm-row input[type=text] {
    flex: 1 1 180px; min-width: 0; border: 1px solid #ddd; border-radius: 8px; padding: 9px 11px; font-size: 0.9em;
  }
  .sm-row select { border: 1px solid #ddd; border-radius: 8px; padding: 9px 8px; font-size: 0.9em; }
  .sm-btn {
    background: var(--primary-color); color: #fff; border: none; border-radius: 8px;
    padding: 9px 16px; font-weight: 600; cursor: pointer; font-size: 0.88em; white-space: nowrap;
  }
  .sm-btn:disabled { opacity: 0.6; cursor: default; }
  .sm-btn.ghost { background: #fff; color: var(--primary-color); border: 1px solid var(--primary-color); }
  .sm-list { list-style: none; margin: 12px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
  .sm-li {
    display: flex; align-items: center; gap: 8px; background: #f7f6ff;
    border: 1px solid rgba(108,92,231,0.12); border-radius: 8px; padding: 8px 10px; font-size: 0.85em;
  }
  .sm-li .sm-grow { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .sm-li .sm-url { color: var(--text-muted); font-size: 0.92em; }
  .sm-badge {
    border-radius: 20px; padding: 1px 8px; font-size: 0.78em; font-weight: 700;
    background: #b2bec3; color: #fff;
  }
  .sm-badge.edit { background: var(--primary-color); }
  .sm-perm { border: 1px solid #ddd; border-radius: 8px; padding: 4px 6px; font-size: 0.82em; background: #fff; cursor: pointer; }
  .sm-mini { background: none; border: none; cursor: pointer; font-size: 0.85em; padding: 2px 6px; border-radius: 6px; }
  .sm-mini.copy { color: var(--primary-color); }
  .sm-mini.del { color: #e74c3c; }
  .sm-empty { color: var(--text-muted); font-size: 0.82em; margin-top: 10px; }
</style>

<div class="sm-overlay" id="sm-overlay">
  <div class="sm-box" role="dialog" aria-modal="true">
    <div class="sm-head">
      <h3>🔗 共有</h3>
      <button class="sm-close" id="sm-close" aria-label="閉じる">×</button>
    </div>
    <div class="sm-body">
      <!-- 公開リンク -->
      <div class="sm-section">
        <h4>公開リンク</h4>
        <p class="sm-hint">リンクを知っている人なら誰でも開けます。閲覧専用が安全です。</p>
        <div class="sm-row">
          <select id="sm-link-perm">
            <option value="view">閲覧のみ</option>
            <option value="edit">編集も可</option>
          </select>
          <button class="sm-btn" id="sm-link-create">リンクを作成</button>
        </div>
        <ul class="sm-list" id="sm-link-list"></ul>
        <div class="sm-empty" id="sm-link-empty">まだ公開リンクはありません。</div>
      </div>

      <!-- メール指定共有 -->
      <div class="sm-section">
        <h4>メールアドレスで共有</h4>
        <p class="sm-hint">指定したメールでログインした本人だけがアクセスできます。</p>
        <div class="sm-row">
          <input type="email" id="sm-grant-email" placeholder="example@gmail.com">
          <select id="sm-grant-perm">
            <option value="view">閲覧のみ</option>
            <option value="edit">編集も可</option>
          </select>
          <button class="sm-btn" id="sm-grant-add">追加</button>
        </div>
        <ul class="sm-list" id="sm-grant-list"></ul>
        <div class="sm-empty" id="sm-grant-empty">まだメール共有はありません。</div>
      </div>
    </div>
  </div>
</div>

<script>
(function () {
  let rtype = null, rid = null, editableSupported = true;
  const overlay = document.getElementById('sm-overlay');
  const linkPerm = document.getElementById('sm-link-perm');
  const grantPerm = document.getElementById('sm-grant-perm');
  const linkList = document.getElementById('sm-link-list');
  const grantList = document.getElementById('sm-grant-list');
  const linkEmpty = document.getElementById('sm-link-empty');
  const grantEmpty = document.getElementById('sm-grant-empty');
  const grantEmail = document.getElementById('sm-grant-email');

  function esc(s) {
    return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
  function permBadge(p) {
    return p === 'edit'
      ? '<span class="sm-badge edit">編集可</span>'
      : '<span class="sm-badge">閲覧</span>';
  }
  function setEditOptionVisible(visible) {
    [linkPerm, grantPerm].forEach(sel => {
      const opt = sel.querySelector('option[value=edit]');
      if (opt) opt.hidden = !visible;
      if (!visible) sel.value = 'view';
    });
  }

  function renderLinks(links) {
    linkList.innerHTML = '';
    linkEmpty.style.display = links.length ? 'none' : '';
    links.forEach(l => {
      const li = document.createElement('li');
      li.className = 'sm-li';
      li.innerHTML = `
        <span class="sm-grow sm-url">${esc(l.url)}</span>
        ${permBadge(l.permission)}
        <button class="sm-mini copy">コピー</button>
        <button class="sm-mini del">取消</button>`;
      li.querySelector('.copy').addEventListener('click', () => {
        navigator.clipboard.writeText(l.url).then(() => {
          const b = li.querySelector('.copy'); b.textContent = 'コピー済'; setTimeout(() => b.textContent = 'コピー', 1200);
        });
      });
      li.querySelector('.del').addEventListener('click', async () => {
        if (!confirm('このリンクを取り消しますか？')) return;
        const res = await fetch(`/share/link/${l.id}`, { method: 'DELETE' });
        if (res.ok) refresh();
      });
      linkList.appendChild(li);
    });
  }

  function renderGrants(grants) {
    grantList.innerHTML = '';
    grantEmpty.style.display = grants.length ? 'none' : '';
    grants.forEach(g => {
      const li = document.createElement('li');
      li.className = 'sm-li';
      // 編集共有が可能なリソース（旅）では、その場で権限を変更できるよう
      // セレクトを表示する。プランは閲覧専用なのでバッジ表示のみ。
      const permHtml = editableSupported
        ? `<select class="sm-perm">
             <option value="view"${g.permission !== 'edit' ? ' selected' : ''}>閲覧のみ</option>
             <option value="edit"${g.permission === 'edit' ? ' selected' : ''}>編集も可</option>
           </select>`
        : permBadge(g.permission);
      li.innerHTML = `
        <span class="sm-grow">${esc(g.grantee_email)}</span>
        ${permHtml}
        <button class="sm-mini del">取消</button>`;
      const sel = li.querySelector('.sm-perm');
      if (sel) sel.addEventListener('change', async () => {
        const prev = g.permission;
        sel.disabled = true;
        try {
          // add_grant は upsert（同一メールなら権限を更新）なので再POSTで変更できる
          const res = await fetch(`/share/${rtype}/${rid}/grant`, {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: g.grantee_email, permission: sel.value }),
          });
          if (res.ok) { g.permission = sel.value; }
          else { alert('権限の変更に失敗しました'); sel.value = prev; }
        } catch (e) { alert('権限の変更に失敗しました'); sel.value = prev; }
        sel.disabled = false;
      });
      li.querySelector('.del').addEventListener('click', async () => {
        if (!confirm(`${g.grantee_email} への共有を取り消しますか？`)) return;
        const res = await fetch(`/share/grant/${g.id}`, { method: 'DELETE' });
        if (res.ok) refresh();
      });
      grantList.appendChild(li);
    });
  }

  async function refresh() {
    try {
      const res = await fetch(`/share/${rtype}/${rid}`);
      const data = await res.json();
      editableSupported = !!data.editable_supported;
      setEditOptionVisible(editableSupported);
      renderLinks(data.links || []);
      renderGrants(data.grants || []);
    } catch (e) { /* noop */ }
  }

  document.getElementById('sm-link-create').addEventListener('click', async (e) => {
    const btn = e.currentTarget; btn.disabled = true;
    try {
      await fetch(`/share/${rtype}/${rid}/link`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ permission: linkPerm.value }),
      });
      await refresh();
    } catch (e) { alert('リンクの作成に失敗しました'); }
    btn.disabled = false;
  });

  document.getElementById('sm-grant-add').addEventListener('click', async (e) => {
    const email = grantEmail.value.trim();
    if (!email || !email.includes('@')) { alert('正しいメールアドレスを入力してください'); return; }
    const btn = e.currentTarget; btn.disabled = true;
    try {
      const res = await fetch(`/share/${rtype}/${rid}/grant`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, permission: grantPerm.value }),
      });
      const data = await res.json();
      if (res.ok) { grantEmail.value = ''; await refresh(); }
      else alert(data.error || '共有の追加に失敗しました');
    } catch (e) { alert('共有の追加に失敗しました'); }
    btn.disabled = false;
  });

  function close() { overlay.style.display = 'none'; }
  document.getElementById('sm-close').addEventListener('click', close);
  overlay.addEventListener('click', (e) => { if (e.target === overlay) close(); });

  window.openShareModal = function (resourceType, resourceId) {
    rtype = resourceType; rid = resourceId;
    grantEmail.value = '';
    overlay.style.display = 'flex';
    refresh();
  };
})();
</script>
