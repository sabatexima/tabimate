{# 共有モーダル（旅・プラン共通）。openShareModal(resourceType, resourceId) で開く。 #}
<link rel="stylesheet" href="{{ url_for('static', filename='css/share-modal.css') }}">

<div class="sm-overlay" id="sm-overlay">
  <div class="sm-box" role="dialog" aria-modal="true">
    <div class="sm-head">
      <h3>🔗 共有</h3>
      <button class="sm-close" id="sm-close" aria-label="閉じる">×</button>
    </div>
    <div class="sm-body">
      <!-- 公開リンク -->
      <div class="sm-section">
        <h4>公開リンク</h4>
        <p class="sm-hint">リンクを知っている人なら誰でも開けます。閲覧専用が安全です。</p>
        <div class="sm-row">
          <select id="sm-link-perm">
            <option value="view">閲覧のみ</option>
            <option value="edit">編集も可</option>
          </select>
          <button class="sm-btn" id="sm-link-create">リンクを作成</button>
        </div>
        <ul class="sm-list" id="sm-link-list"></ul>
        <div class="sm-empty" id="sm-link-empty">まだ公開リンクはありません。</div>
      </div>

      <!-- メール指定共有 -->
      <div class="sm-section">
        <h4>メールアドレスで共有</h4>
        <p class="sm-hint">指定したメールでログインした本人だけがアクセスできます。</p>
        <div class="sm-row">
          <input type="email" id="sm-grant-email" placeholder="example@gmail.com">
          <select id="sm-grant-perm">
            <option value="view">閲覧のみ</option>
            <option value="edit">編集も可</option>
          </select>
          <button class="sm-btn" id="sm-grant-add">追加</button>
        </div>
        <ul class="sm-list" id="sm-grant-list"></ul>
        <div class="sm-empty" id="sm-grant-empty">まだメール共有はありません。</div>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/share-modal.js') }}"></script>
