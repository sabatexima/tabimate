{% extends "layout.html" %}

{% block title %}{{ heading }} — たびメイト{% endblock %}

{% block head %}
<style>
  .err-wrap {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 70vh; text-align: center; padding: 24px 16px;
  }
  .err-mate {
    width: auto; height: 140px; object-fit: contain;
    filter: drop-shadow(0 6px 14px rgba(120, 110, 90, 0.18));
    margin-bottom: 8px;
  }
  .err-code { font-size: 0.85em; color: var(--text-muted); letter-spacing: 0.15em; margin: 0 0 4px; }
  .err-wrap h1 { margin: 0 0 10px; font-size: 1.4em; color: var(--text-main); }
  .err-wrap p { margin: 0 0 26px; color: var(--text-muted); line-height: 1.8; }
  .err-home {
    display: inline-block; background: var(--primary-color); color: #fff;
    text-decoration: none; font-weight: 700;
    padding: 12px 28px; border-radius: 26px;
    box-shadow: 0 6px 16px rgba(79, 168, 58, 0.3);
    transition: transform 0.12s;
  }
  .err-home:hover { transform: translateY(-2px); }
</style>
{% endblock %}

{% block content %}
<div class="err-wrap">
  <img class="err-mate" src="{{ url_for('static', filename='img/mate.png') }}" alt="ちゃむ">
  <p class="err-code">{{ code }}</p>
  <h1>{{ heading }}</h1>
  <p>{{ message }}</p>
  <a class="err-home" href="{{ url_for('planner.home') }}">🍀 ホームへ戻る</a>
</div>
{% endblock %}
