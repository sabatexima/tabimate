<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}たびメイト{% endblock %}</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐷</text></svg>">
  {% block head %}{% endblock %}
  <style>
    :root {
      --primary-color: #6c5ce7;
      --text-main: #2d3436;
      --text-muted: #636e72;
    }
    html, body {
      margin: 0;
      height: 100%;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto,
        "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Noto Sans JP",
        Meiryo, sans-serif;
    }
    /* ページ共通の中央寄せコンテナ（各画面で利用） */
    .container { max-width: 1040px; margin: 0 auto; }

    .wrapper {
      display: flex;
      min-height: 100vh;
      min-height: 100dvh;
    }

    @media (max-width: 768px) {
      html, body { overflow: hidden; }
      .wrapper { height: 100%; min-height: unset; }
      /* .main を縦スクロール可能な領域にする（長いページでもスクロールできるように） */
      .main { overflow-y: auto; -webkit-overflow-scrolling: touch; }
    }

    /* ハンバーガーボタン（モバイルのみ表示）*/
    .hamburger {
      display: none;
      position: fixed;
      top: 12px;
      left: 12px;
      z-index: 200;
      background: #333;
      color: white;
      border: none;
      border-radius: 8px;
      width: 40px;
      height: 40px;
      font-size: 1.2rem;
      cursor: pointer;
      align-items: center;
      justify-content: center;
    }

    /* オーバーレイ（モバイルでサイドバー展開時の背景）*/
    .sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
    }

    .sidebar {
      width: 220px;
      background-color: #333;
      color: white;
      padding: 20px;
      box-sizing: border-box;
      flex-shrink: 0;
    }

    .sidebar a {
      display: block;
      color: white;
      text-decoration: none;
      margin: 10px 0;
      padding: 6px 0;
    }

    .main {
      flex: 1;
      min-width: 0;
      padding: 20px;
      background-color: #f4f4f4;
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
      }

      .sidebar {
        position: fixed;
        top: 0;
        left: 0;
        height: 100%;
        height: 100dvh;
        z-index: 150;
        transform: translateX(-100%);
        transition: transform 0.25s ease;
      }

      .sidebar.open {
        transform: translateX(0);
      }

      .sidebar-overlay.open {
        display: block;
      }

      .main {
        padding: 20px 12px 12px;
        padding-top: 60px; /* ハンバーガーボタン分 */
      }
    }
  </style>
</head>
<body>
  <button class="hamburger" id="hamburger" aria-label="メニューを開く">☰</button>
  <div class="sidebar-overlay" id="overlay"></div>

  <div class="wrapper">
    {% include "sidebar.html" %}
    <div class="main">
      {% block content %}{% endblock %}
    </div>
  </div>

  <script>
    const hamburger = document.getElementById('hamburger');
    const overlay = document.getElementById('overlay');
    const sidebar = document.querySelector('.sidebar');

    function openSidebar() {
      sidebar.classList.add('open');
      overlay.classList.add('open');
    }
    function closeSidebar() {
      sidebar.classList.remove('open');
      overlay.classList.remove('open');
    }

    hamburger.addEventListener('click', openSidebar);
    overlay.addEventListener('click', closeSidebar);
    sidebar.querySelectorAll('a').forEach(a => a.addEventListener('click', closeSidebar));
  </script>
</body>
</html>
