<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#7d6a52">
  <title>{% block title %}たびメイト{% endblock %}</title>
  <link rel="icon" href="{{ url_for('static', filename='img/mate-head.png') }}">
  <!-- PWA: ホーム画面に追加してアプリとして起動できるようにする -->
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/icons/apple-touch-icon.png') }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="たびメイト">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <meta name="stadia-key" content="{{ config.get('STADIA_API_KEY', '') }}">
  {% block head %}{% endblock %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/layout.css') }}">
</head>
<body>
  {% if session.get('user_id') %}
  <button class="hamburger" id="hamburger" aria-label="メニューを開く">☰</button>
  <div class="sidebar-overlay" id="overlay"></div>
  {% endif %}

  <div class="wrapper">
    {% if session.get('user_id') %}{% include "sidebar.html" %}{% endif %}
    <div class="main">
      {% block content %}{% endblock %}
    </div>
  </div>

<script src="{{ url_for('static', filename='js/layout.js') }}"></script>
<script src="{{ url_for('static', filename='js/openmoji.js') }}"></script>
<script>
  // PWA: Service Worker登録（未対応ブラウザでは何もしない）
  if ('serviceWorker' in navigator) { navigator.serviceWorker.register('/sw.js').catch(function () {}); }
</script>
</body>
</html>
