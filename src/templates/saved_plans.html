{% extends "layout.html" %}

{% block title %}保存済みプラン — たびメイト{% endblock %}

{% block head %}
<style>
  :root {
    --primary-color: #6c5ce7;
    --text-main: #2d3436;
    --text-muted: #636e72;
  }

  .page-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .page-header h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--text-main);
    margin: 0;
  }

  #plans-container {
    display: flex;
    flex-direction: column;
    gap: 20px;
    max-width: 860px;
  }
  .shared-flag {
    margin-right: auto;
    color: var(--primary-color);
    font-weight: 700;
    font-size: 0.85em;
  }
  .open-link {
    color: var(--primary-color);
    text-decoration: none;
    font-weight: 600;
    font-size: 0.88em;
  }
  .open-link:hover { text-decoration: underline; }

  .plan-card {
    background: #fff;
    border-radius: 12px;
    border: 1px solid rgba(108,92,231,0.15);
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  }

  .plan-summary-block {
    background: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
    color: white;
    padding: 14px 16px;
  }
  .plan-title {
    font-size: 1.05em;
    font-weight: 700;
    margin-bottom: 8px;
  }
  .plan-meta {
    font-size: 0.82em;
    opacity: 0.8;
    margin-bottom: 8px;
  }
  .plan-summary-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 4px 12px;
    font-size: 0.88em;
    opacity: 0.95;
  }
  .plan-summary-grid span { display: block; }

  .plan-accordion {
    border-top: 1px solid rgba(108,92,231,0.1);
  }
  .plan-accordion details {
    border-bottom: 1px solid rgba(108,92,231,0.08);
  }
  .plan-accordion details:last-child { border-bottom: none; }
  .plan-accordion summary {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 11px 16px;
    font-weight: 600;
    font-size: 0.95em;
    cursor: pointer;
    list-style: none;
    user-select: none;
    color: var(--text-main);
    transition: background 0.15s;
  }
  .plan-accordion summary::-webkit-details-marker { display: none; }
  .plan-accordion summary:hover { background: #f8f7ff; }
  .plan-accordion summary::after {
    content: '›';
    margin-left: auto;
    font-size: 1.2em;
    color: var(--primary-color);
    transition: transform 0.2s;
    display: inline-block;
  }
  .plan-accordion details[open] summary::after { transform: rotate(90deg); }
  .plan-accordion-body {
    padding: 4px 16px 14px 16px;
    font-size: 0.9em;
    color: var(--text-main);
    line-height: 1.6;
  }
  .plan-accordion-body ul { margin: 0; padding-left: 1.2em; }
  .plan-accordion-body li { margin: 5px 0; }

  .plan-footer {
    padding: 12px 16px;
    border-top: 1px solid rgba(108,92,231,0.1);
    display: flex;
    justify-content: flex-end;
    gap: 8px;
  }
  .share-btn {
    background: none;
    border: 1px solid var(--primary-color);
    color: var(--primary-color);
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.85em;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .share-btn:hover { background: var(--primary-color); color: white; }
  .delete-btn {
    background: none;
    border: 1px solid #f43f5e;
    color: #f43f5e;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 0.85em;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .delete-btn:hover { background: #f43f5e; color: white; }

  .empty-state {
    text-align: center;
    color: var(--text-muted);
    padding: 60px 0;
    font-size: 1.05em;
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }

  #loading {
    color: var(--text-muted);
    padding: 40px 0;
  }
</style>
{% endblock %}

{% block content %}
<div class="page-header">
  <h1>🗂️ 保存済みプラン</h1>
</div>

<div id="loading">読み込み中...</div>
<div id="plans-container" style="display:none;"></div>

{% include "_share_modal.html" %}

<script>
  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function fmt(n) {
    return n != null ? Number(n).toLocaleString() : '—';
  }

  function accordion(icon, label, items) {
    if (!items || items.length === 0) return '';
    const lis = items.map(i => `<li>${esc(i)}</li>`).join('');
    return `<details>
      <summary>${icon} ${esc(label)}</summary>
      <div class="plan-accordion-body"><ul>${lis}</ul></div>
    </details>`;
  }

  function renderPlan(plan, opts = {}) {
    const shared = !!opts.shared;
    const card = document.createElement('div');
    card.className = 'plan-card';

    const saved = plan.created_at
      ? new Date(plan.created_at).toLocaleDateString('ja-JP')
      : '';

    const footer = shared
      ? `<div class="plan-footer">
           <span class="shared-flag">🤝 共有された</span>
           <a class="open-link" href="/shared/plan/${esc(plan.id)}">詳細を開く ›</a>
         </div>`
      : `<div class="plan-footer">
           <button class="share-btn" data-id="${esc(plan.id)}">🔗 共有</button>
           <button class="delete-btn" data-id="${esc(plan.id)}">削除</button>
         </div>`;

    card.innerHTML = `
      <div class="plan-summary-block">
        <div class="plan-title">🗾 旅行プラン：${esc(plan.destination)}</div>
        ${saved ? `<div class="plan-meta">保存日: ${esc(saved)}</div>` : ''}
        <div class="plan-summary-grid">
          <span>📍 出発地: ${esc(plan.departure_location || '—')}</span>
          <span>⏱️ 期間: ${esc(plan.duration || '—')}</span>
          <span>👥 人数: ${plan.num_people != null ? esc(plan.num_people) + '人' : '—'}</span>
          <span>💴 予算上限: ${fmt(plan.budget_limit)}円/人</span>
          <span>🚄 交通費: ${fmt(plan.transport_cost)}円/人</span>
          <span>💰 残り予算: ${fmt(plan.remaining_budget)}円/人</span>
        </div>
      </div>
      <div class="plan-accordion">
        ${accordion('✨', '主要観光地', plan.spots)}
        ${accordion('🍱', 'グルメ', plan.restaurants)}
        ${accordion('🏨', '宿泊施設', plan.accommodation)}
        ${accordion('📅', 'スケジュール', plan.schedule)}
        ${accordion('💰', '費用見積もり', plan.budget_estimate)}
      </div>
      ${footer}
    `;

    if (!shared) {
      card.querySelector('.share-btn').addEventListener('click', () => {
        window.openShareModal('plan', plan.id);
      });

      card.querySelector('.delete-btn').addEventListener('click', async (e) => {
        if (!confirm('このプランを削除しますか？')) return;
        const btn = e.currentTarget;
        btn.disabled = true;
        btn.textContent = '削除中...';
        const res = await fetch(`/delete_plan/${plan.id}`, { method: 'DELETE' });
        const result = await res.json();
        if (result.status === 'OK') {
          card.remove();
          if (!document.querySelector('#plans-container .plan-card')) showEmpty();
        } else {
          btn.disabled = false;
          btn.textContent = '削除';
          alert('削除に失敗しました');
        }
      });
    }

    return card;
  }

  function showEmpty() {
    const container = document.getElementById('plans-container');
    container.innerHTML = `<div class="empty-state"><div class="icon">🗂️</div>保存済みのプランはありません</div>`;
  }

  async function loadPlans() {
    const loading = document.getElementById('loading');
    const container = document.getElementById('plans-container');
    try {
      // 自分のプランと共有されたプランを同時に取得し、同じ一覧に並べる
      const [mineRes, sharedRes] = await Promise.all([
        fetch('/get_my_plans'),
        fetch('/get_shared_plans'),
      ]);
      const mine = await mineRes.json();
      let shared = { plans: [] };
      try { shared = await sharedRes.json(); } catch (e) { /* 共有取得失敗は無視 */ }

      loading.style.display = 'none';
      container.style.display = 'flex';

      const myPlans = (mine && mine.plans) || [];
      const sharedPlans = (shared && shared.status === 'OK' && shared.plans) || [];

      if (myPlans.length === 0 && sharedPlans.length === 0) {
        showEmpty();
        return;
      }
      myPlans.forEach(plan => container.appendChild(renderPlan(plan)));
      sharedPlans.forEach(plan => container.appendChild(renderPlan(plan, { shared: true })));
    } catch (err) {
      loading.textContent = 'プランの読み込みに失敗しました';
      console.error(err);
    }
  }

  loadPlans();
</script>
{% endblock %}
