<div class="sidebar">
  <div class="sidebar-brand">
    <img src="{{ url_for('static', filename='img/mate-head.png') }}" alt="" class="sidebar-mate">
    <span>たびメイト</span>
  </div>
  <h2>メニュー</h2>
  <a href="{{ url_for('planner.home') }}">ホーム</a>
  <a href="{{ url_for('planner.chat') }}">旅行プラン作成</a>
  <a href="{{ url_for('planner.saved_plans') }}">保存プラン</a>
  <a href="{{ url_for('reflection.index') }}">旅の振り返り</a>


  <div class="sidebar-footer">
    {% if session.get('user_name') %}
      <div class="sidebar-user">{{ session['user_name'] }}</div>
      <a href="{{ url_for('auth.logout') }}" class="sidebar-logout">ログアウト</a>
    {% else %}
      <a href="{{ url_for('auth.login') }}" class="sidebar-login">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M12.545 10.239v3.821h5.445c-.712 2.315-2.647 3.972-5.445 3.972a6.033 6.033 0 110-12.064c1.498 0 2.866.549 3.921 1.453l2.814-2.814A9.969 9.969 0 0012.545 2C7.021 2 2.543 6.477 2.543 12s4.478 10 10.002 10c8.396 0 10.249-7.85 9.426-11.748l-9.426-.013z"/></svg>
        Googleでログイン
      </a>
    {% endif %}
    <div class="sidebar-footer-links">
      <a href="{{ url_for('planner.terms') }}">利用規約</a>
      <span> · </span>
      <a href="{{ url_for('planner.privacy') }}">プライバシー</a>
    </div>
  </div>
</div>
